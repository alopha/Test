<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="mirrorGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#e5e7eb" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
    <style><![CDATA[
      .title { font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif; fill: #e5e7eb; font-weight: 600; }
      .label { font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #e5e7eb; font-size: 16px; }
      .note { font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #cbd5e1; font-size: 14px; }
      .ink { filter: url(#soft); }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1280" height="860" fill="url(#bg)"/>

  <!-- Header -->
  <text x="640" y="70" text-anchor="middle" class="title" font-size="28">不离日用常行内，直到先天未画前</text>
  <text x="640" y="102" text-anchor="middle" class="note">四个具体生活场景 → 观照 → 回到“清水之镜”</text>

  <!-- Panels layout positions -->
  <!-- TL: 吃饭饮茶 -->
  <g transform="translate(120,160)" filter="url(#shadow)">
    <rect x="0" y="0" rx="16" ry="16" width="380" height="220" fill="url(#panel)" stroke="#334155" stroke-opacity="0.4"/>
    <text x="24" y="36" class="label">吃饭饮茶</text>
    <!-- Table -->
    <rect x="36" y="150" width="308" height="18" rx="4" fill="#475569"/>
    <!-- Bowl -->
    <ellipse cx="120" cy="140" rx="42" ry="18" fill="#e2e8f0"/>
    <rect x="87" y="140" width="66" height="8" fill="#94a3b8"/>
    <!-- Chopsticks -->
    <rect x="170" y="110" width="82" height="4" fill="#eab308" transform="rotate(8 170 110)"/>
    <rect x="170" y="116" width="82" height="4" fill="#eab308" transform="rotate(8 170 116)"/>
    <!-- Teacup -->
    <ellipse cx="260" cy="136" rx="20" ry="10" fill="#fde68a"/>
    <rect x="246" y="136" width="28" height="10" fill="#fcd34d"/>
    <path d="M 248 118 C 242 106, 260 100, 254 88" stroke="#f8fafc" stroke-width="2" fill="none"/>
    <text x="24" y="70" class="note">观：味觉起灭，心如镜不逐。</text>
  </g>

  <!-- BL: 行走坐卧 -->
  <g transform="translate(120,420)" filter="url(#shadow)">
    <rect x="0" y="0" rx="16" ry="16" width="380" height="240" fill="url(#panel)" stroke="#334155" stroke-opacity="0.4"/>
    <text x="24" y="36" class="label">行走坐卧</text>
    <!-- Path -->
    <path d="M 40 200 C 120 160, 180 210, 240 180 C 300 150, 340 188, 360 170" stroke="#64748b" stroke-width="6" fill="none"/>
    <!-- Footprints -->
    <g fill="#e5e7eb" opacity="0.9">
      <ellipse cx="90" cy="180" rx="8" ry="5"/>
      <ellipse cx="110" cy="168" rx="7" ry="4"/>
      <ellipse cx="138" cy="162" rx="7" ry="4"/>
      <ellipse cx="166" cy="154" rx="7" ry="4"/>
      <ellipse cx="196" cy="148" rx="7" ry="4"/>
      <ellipse cx="226" cy="144" rx="7" ry="4"/>
    </g>
    <text x="24" y="70" class="note">照：脚踏步步，念归当下。</text>
  </g>

  <!-- TR: 工作事务（键盘+屏幕） -->
  <g transform="translate(780,160)" filter="url(#shadow)">
    <rect x="0" y="0" rx="16" ry="16" width="380" height="220" fill="url(#panel)" stroke="#334155" stroke-opacity="0.4"/>
    <text x="24" y="36" class="label">工作事务</text>
    <!-- Laptop -->
    <rect x="70" y="70" width="240" height="120" rx="8" fill="#0b132b" stroke="#334155"/>
    <rect x="86" y="86" width="208" height="60" rx="6" fill="#111827"/>
    <rect x="60" y="190" width="260" height="14" rx="3" fill="#1f2937"/>
    <rect x="86" y="114" width="86" height="6" fill="#22c55e"/>
    <rect x="86" y="126" width="120" height="6" fill="#60a5fa"/>
    <rect x="86" y="138" width="60" height="6" fill="#f59e0b"/>
    <text x="24" y="70" class="note">返：忙而不乱，以事验心。</text>
  </g>

  <!-- BR: 言语应对/亲友相处（对话） -->
  <g transform="translate(780,420)" filter="url(#shadow)">
    <rect x="0" y="0" rx="16" ry="16" width="380" height="240" fill="url(#panel)" stroke="#334155" stroke-opacity="0.4"/>
    <text x="24" y="36" class="label">言语应对 · 亲友相处</text>
    <!-- Speech bubbles -->
    <g>
      <rect x="56" y="84" rx="12" ry="12" width="150" height="60" fill="#e0f2fe"/>
      <path d="M 80 144 L 76 162 L 94 148 Z" fill="#e0f2fe"/>
      <rect x="206" y="116" rx="12" ry="12" width="150" height="60" fill="#dcfce7"/>
      <path d="M 320 116 L 338 108 L 328 132 Z" fill="#dcfce7"/>
      <rect x="120" y="160" rx="10" ry="10" width="180" height="44" fill="#fee2e2"/>
    </g>
    <text x="24" y="70" class="note">合：以诚相待，不住言相。</text>
  </g>

  <!-- Converging arrows to center -->
  <g stroke="url(#arrowGrad)" stroke-width="2.5" fill="none" marker-end="url(#arrowHead)" opacity="0.9">
    <path d="M 520 270 C 620 290, 680 320, 730 370"/>
    <path d="M 520 560 C 640 540, 710 500, 740 470"/>
    <path d="M 760 270 C 710 300, 670 330, 640 370"/>
    <path d="M 760 600 C 690 580, 650 540, 630 500"/>
  </g>

  <!-- Center: 清水之镜（先天未画前） -->
  <g transform="translate(0,0)">
    <ellipse cx="640" cy="470" rx="150" ry="150" fill="url(#mirrorGrad)" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Ripples -->
    <ellipse cx="640" cy="470" rx="120" ry="40" fill="none" stroke="#94a3b8" stroke-opacity="0.45"/>
    <ellipse cx="640" cy="470" rx="100" ry="32" fill="none" stroke="#94a3b8" stroke-opacity="0.3"/>
    <ellipse cx="640" cy="470" rx="80" ry="26" fill="none" stroke="#94a3b8" stroke-opacity="0.2"/>
    <text x="640" y="458" text-anchor="middle" class="title" font-size="22" fill="#0f172a">先天</text>
    <text x="640" y="486" text-anchor="middle" class="note" fill="#334155">未画前 · 清水之镜</text>
  </g>

  <!-- Legend: 操作四字 -->
  <g>
    <text x="640" y="190" text-anchor="middle" class="note">观 · 照 · 返 · 合</text>
  </g>

  <!-- Caption -->
  <text x="640" y="820" text-anchor="middle" class="note" fill="#94a3b8">把“吃饭、行走、工作、对话”等日常，化作返根的路：不离当下，念念回照，直入本真。</text>
</svg>